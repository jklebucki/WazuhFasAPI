# REVIEW REQUIRED: certificate paths, server_name and every allow subnet before production.
limit_req_zone $binary_remote_addr zone=wazuh_bootstrap_client:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=wazuh_bootstrap_admin:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=wazuh_bootstrap_health:10m rate=120r/m;

server {
    listen 8443 ssl;
    server_name wazuh-srv.ad.citronex.pl;
    server_tokens off;

    ssl_certificate     /etc/nginx/tls/REPLACE_WITH_CORPORATE_CA_CERT.pem;
    ssl_certificate_key /etc/nginx/tls/REPLACE_WITH_PRIVATE_KEY.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:WAZUHBOOTSTRAP:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # EXAMPLE ONLY — replace with the exact production client/admin subnets.
    allow 192.168.0.0/16;
    allow 172.16.0.0/12;
    deny all;

    client_max_body_size 16k;
    proxy_http_version 1.1;
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
    proxy_send_timeout 10s;
    proxy_intercept_errors on;
    proxy_hide_header Server;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'none'" always;

    location = /health/live {
        limit_req zone=wazuh_bootstrap_health burst=20 nodelay;
        proxy_pass http://127.0.0.1:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location = /health/ready {
        limit_req zone=wazuh_bootstrap_health burst=20 nodelay;
        proxy_pass http://127.0.0.1:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location = /api/v1/manifest {
        limit_req zone=wazuh_bootstrap_client burst=10 nodelay;
        proxy_pass http://127.0.0.1:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location ~ ^/api/v1/agents/[^/]+$ {
        limit_req zone=wazuh_bootstrap_client burst=10 nodelay;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location = /api/v1/agents {
        limit_req zone=wazuh_bootstrap_admin burst=5 nodelay;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location ^~ /api/v1/groups {
        limit_req zone=wazuh_bootstrap_admin burst=5 nodelay;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    # OpenAPI is intentionally unavailable through the client-facing proxy.
    location ~ ^/(docs|redoc|openapi\.json) { return 404; }
    location / { return 404; }

    error_page 500 502 503 504 =503 @unavailable;
    location @unavailable {
        default_type application/json;
        return 503 '{"detail":"Service Unavailable"}';
    }
}
