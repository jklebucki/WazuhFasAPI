# Wazuh Bootstrap API — central reverse proxy 192.168.21.17.
# Backend 192.168.21.15:8765 must accept traffic only from this proxy.
limit_req_zone $binary_remote_addr zone=wazuh_bootstrap_client:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=wazuh_bootstrap_admin:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=wazuh_bootstrap_health:10m rate=120r/m;

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name wazuh.ad.citronex.pl;
    server_tokens off;
    more_clear_headers Server;

    ssl_certificate     /etc/ssl/cert_ad/ad.citronex.pl.pem;
    ssl_certificate_key /etc/ssl/cert_ad/ad.citronex.pl.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:WAZUHBOOTSTRAP:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Reviewed corporate client networks and local proxy diagnostics.
    allow 127.0.0.1;
    allow ::1;
    allow 192.168.0.0/16;
    deny all;

    client_max_body_size 16k;
    proxy_http_version 1.1;
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
    proxy_send_timeout 10s;
    proxy_intercept_errors on;
    proxy_hide_header Server;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'none'" always;

    location = /health/live {
        limit_req zone=wazuh_bootstrap_health burst=20 nodelay;
        proxy_pass http://192.168.21.15:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location = /health/ready {
        limit_req zone=wazuh_bootstrap_health burst=20 nodelay;
        proxy_pass http://192.168.21.15:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location = /api/v1/manifest {
        limit_req zone=wazuh_bootstrap_client burst=10 nodelay;
        proxy_pass http://192.168.21.15:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location ~ ^/api/v1/agents/[^/]+$ {
        limit_req zone=wazuh_bootstrap_client burst=10 nodelay;
        proxy_buffering off;
        proxy_pass http://192.168.21.15:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location = /api/v1/agents {
        limit_req zone=wazuh_bootstrap_admin burst=5 nodelay;
        proxy_buffering off;
        proxy_pass http://192.168.21.15:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location ^~ /api/v1/groups {
        limit_req zone=wazuh_bootstrap_admin burst=5 nodelay;
        proxy_buffering off;
        proxy_pass http://192.168.21.15:8765;
        include /etc/nginx/snippets/wazuh-bootstrap-proxy-headers.conf;
    }

    location ~ ^/(docs|redoc|openapi\.json) {
        return 404;
    }

    location / {
        return 404;
    }

    error_page 500 502 503 504 =503 @bootstrap_unavailable;
    location @bootstrap_unavailable {
        default_type application/json;
        return 503 '{"detail":"Service Unavailable"}';
    }
}
